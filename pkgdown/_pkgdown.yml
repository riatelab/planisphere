home:
  title: "Map projections"
  description: >
    Planisphere is wrapper around D3.js for cartographic projections to design and visualize world maps (planispheres). Projections are computed using D3.js spherical geometry rather than ellipsoidal geodesic models.
url: https://rneocarto.github.io/planisphere/

template:
  bootstrap: 5
  bslib:
    base_font: {google: "Atkinson Hyperlegible"}
    heading_font: {google: "Atkinson Hyperlegible"}
    code_font: {google: "Fira Code"}
  opengraph:
    image:
      src: man/figures/planisphere.png
      alt: "planisphere: map projections"

navbar:
  structure:
    left: [home, articles, reference]

  components:
    articles:
      text: Articles
      menu:
      - text: Get started
        href: articles/hello_planisphere.html
      - text: Gallery
        href: articles/gallery.html

reference:
  - title: "Core API"
    contents:
      - init
      - project
      - display

  - title: "Internals"
    contents:
      - build_projection_chain
      - flipY

figures:
  dev: grDevices::png
  fig.asp: 1
  fig.width: 8
  dpi: 96

footer:
  structure:
    left: developed_by
    right: package
